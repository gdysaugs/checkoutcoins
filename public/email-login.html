<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Login | Spark Games</title>
    <meta name="description" content="Login to Spark Games via magic link email." />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/email-login.js" defer></script>
  </head>
  <body>
    <main class="page">
      <section class="panel auth-panel">
        <h2>Email Magic Link Login</h2>
        <p class="muted">Enter your email and we'll send a one-time login link.</p>

        <form id="magicLinkForm" class="card">
          <label for="emailInput">Email</label>
          <input id="emailInput" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
          <button id="sendMagicBtn" type="submit">Send Magic Link</button>
        </form>

        <div class="user-actions">
          <a class="ghost-btn" href="/">Back to Top</a>
        </div>
        <p id="magicFlash" class="flash hidden"></p>
      </section>
    </main>
  </body>
</html>
