<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stripeコイン購入 | checkoutcoins</title>
    <meta name="description" content="checkoutcoinsのStripe専用コイン購入ページ" />
    <link rel="stylesheet" href="/purchase.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/purchase.js" defer></script>
  </head>
  <body>
    <main class="purchase-page">
      <section class="purchase-hero card">
        <div class="hero-top">
          <a class="back-link" href="/">← トップへ戻る</a>
          <a class="top-link" href="/terms.html">利用規約</a>
        </div>
        <h1>Stripe専用 コイン購入</h1>
        <p>
          checkoutcoins.uk で使うコインを Stripe で購入できます。
          購入したコインは同じウォレットに即時反映されます。
        </p>
      </section>

      <section id="authSection" class="card">
        <h2>ログイン</h2>
        <div class="auth-row">
          <button id="googleLoginBtn" type="button" class="primary-btn">Googleでログイン</button>
          <button id="emailLoginBtn" type="button" class="ghost-btn">メールでログイン</button>
        </div>
        <p class="muted">購入前にログインしてください。</p>
      </section>

      <section id="walletSection" class="card hidden">
        <div class="wallet-row">
          <div>
            <p class="label">ログイン中</p>
            <strong id="userEmail">-</strong>
          </div>
          <div class="point-box">
            <span>保有コイン</span>
            <strong id="pointCount">0</strong>
          </div>
          <div class="actions">
            <button id="refreshBtn" type="button" class="ghost-btn">更新</button>
            <button id="logoutBtn" type="button" class="ghost-btn">ログアウト</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>プラン</h2>
        <p class="muted">1コイン = 1回分の消費に対応</p>
        <div id="planGrid" class="plan-grid"></div>
      </section>

      <p id="flash" class="flash hidden"></p>
    </main>

    <a class="legal-fab" href="/tokusho.html">特定商取引法に基づく表記</a>
  </body>
</html>
